<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="sans-serif">
    <rect width="800" height="500" fill="#1e293b" />
    
    <!-- Fake MRI scan block -->
    <rect x="150" y="100" width="200" height="200" rx="10" fill="#334155" stroke="#475569" stroke-width="2"/>
    <circle cx="250" cy="200" r="60" fill="#cbd5e1" opacity="0.8"/>
    <circle cx="250" cy="200" r="30" fill="#0f172a" opacity="0.6"/>
    <text x="250" y="330" text-anchor="middle" font-size="18" fill="#94a3b8">Input: Cardiac MRI</text>
    
    <!-- AI Model -->
    <rect x="420" y="150" width="100" height="100" rx="10" fill="#3b82f6" opacity="0.9"/>
    <text x="470" y="205" text-anchor="middle" font-size="20" fill="#fff" font-weight="bold">AI Model</text>
    
    <!-- Arrows -->
    <line x1="360" y1="200" x2="410" y2="200" stroke="#fff" stroke-width="4" marker-end="url(#arrow-white)"/>
    <line x1="530" y1="200" x2="580" y2="200" stroke="#fff" stroke-width="4" marker-end="url(#arrow-white)"/>
    
    <!-- Output -->
    <rect x="590" y="130" width="160" height="140" rx="10" fill="#10b981" opacity="0.9"/>
    <text x="670" y="180" text-anchor="middle" font-size="20" fill="#fff" font-weight="bold">Diagnosis</text>
    <text x="670" y="210" text-anchor="middle" font-size="14" fill="#ecfdf5">Cardiovascular</text>
    <text x="670" y="230" text-anchor="middle" font-size="14" fill="#ecfdf5">Disease Screening</text>
    
    <defs>
        <marker id="arrow-white" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#fff"/>
        </marker>
    </defs>
</svg>