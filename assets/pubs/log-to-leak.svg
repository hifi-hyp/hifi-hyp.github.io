<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="sans-serif">
    <!-- Background -->
    <rect width="800" height="500" fill="#f8fafc" />
    <!-- Titles -->
    <text x="400" y="50" text-anchor="middle" font-size="28" font-weight="bold" fill="#0f172a">Log-To-Leak Attack Framework</text>
    
    <!-- Blocks -->
    <rect x="80" y="200" width="160" height="100" rx="10" fill="#fee2e2" stroke="#ef4444" stroke-width="4"/>
    <text x="160" y="250" text-anchor="middle" font-size="20" fill="#991b1b" font-weight="bold">Attacker</text>
    <text x="160" y="275" text-anchor="middle" font-size="16" fill="#991b1b">Malicious Payload</text>

    <path d="M 250 250 L 330 250" stroke="#94a3b8" stroke-width="4" marker-end="url(#arrow)"/>

    <rect x="340" y="200" width="160" height="100" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="4"/>
    <text x="420" y="250" text-anchor="middle" font-size="20" fill="#b45309" font-weight="bold">MCP Tool Log</text>
    <text x="420" y="275" text-anchor="middle" font-size="16" fill="#b45309">Injection via Logs</text>

    <path d="M 510 250 L 590 250" stroke="#94a3b8" stroke-width="4" marker-end="url(#arrow)"/>

    <rect x="600" y="200" width="160" height="100" rx="10" fill="#e0e7ff" stroke="#3b82f6" stroke-width="4"/>
    <text x="680" y="250" text-anchor="middle" font-size="20" fill="#1e40af" font-weight="bold">LLM Agent</text>
    <text x="680" y="275" text-anchor="middle" font-size="16" fill="#1e40af">Data Leakage</text>

    <!-- Arrow Def -->
    <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
        </marker>
    </defs>
</svg>